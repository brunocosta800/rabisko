version: '3.8'

services:
  app:
    build: .
    container_name: spring-boot-app
    ports:
      - "3000:3000"
      - "5005:5005"
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI}
      - SPRING_PROFILES_ACTIVE=dev
    stdin_open: true
    tty: true

  # Opcional: Se quiserem testar localmente sem conectar direto no Azure
  # podem descomentar as linhas abaixo para ter um MongoDB local rápido
  mongodb:
   image: mongo:latest
   container_name: mongodb-local
   ports:
     - "27017:27017"