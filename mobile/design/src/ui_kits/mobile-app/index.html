<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rabisko · Mobile UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="motion.css">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { background: #1a1a1a; min-height: 100vh; margin: 0; }
  body { display: flex; align-items: center; justify-content: center; padding: 32px; box-sizing: border-box; gap: 32px; }
  .stage { display: flex; gap: 28px; align-items: center; }
  .device {
    position: relative; width: 432px; height: 904px;
    background: #0a0a0a; border-radius: 60px; padding: 15px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), inset 0 0 0 2px #2a2a2a;
  }
  .notch {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 32px; background: #0a0a0a; border-radius: 999px; z-index: 2;
  }
  .screen { position: relative; width: 402px; height: 874px; border-radius: 48px; overflow: hidden; background: var(--rbk-bg); }
  .status-time { position: absolute; top: 18px; left: 28px; color: var(--rbk-ink); font: 600 14px/1 var(--font-body); z-index: 3; }
  .status-icons { position: absolute; top: 18px; right: 28px; color: var(--rbk-ink); z-index: 3; display:flex; gap: 6px; }

  .sidebar { display: flex; flex-direction: column; gap: 8px; color: #fff; font-family: var(--font-body); min-width: 200px; }
  .sidebar h2 { font: var(--t-display-md); letter-spacing: .03em; color: #fff; margin: 0 0 6px; }
  .sidebar button { background: transparent; border: 1px solid #444; color: #ccc; padding: 8px 14px; border-radius: 999px; cursor: pointer; font: 13px var(--font-body); text-align: left; transition: all .12s; }
  .sidebar button.active { background: var(--rbk-plum); border-color: var(--rbk-plum); color: #fff; }
  .sidebar button:hover { border-color: #888; }
  .hint { color: #888; font: 11px var(--font-body); margin-top: 16px; max-width: 200px; }
</style>
</head>
<body>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#EAE0D5"/>
    <rect x="70" y="40" width="60" height="120" rx="14" fill="#1A1A1A"/>
    <rect x="78" y="56" width="44" height="80" rx="4" fill="#EAE0D5"/>
    <circle cx="100" cy="148" r="3" fill="#EAE0D5"/>
    <text x="100" y="186" text-anchor="middle" font-family="Impact, sans-serif" font-size="14" fill="#1A1A1A" letter-spacing="2">RABISKO</text>
  </svg>
</template>

<div id="root"></div>

<script type="text/babel" src="components/Frame.jsx"></script>
<script type="text/babel" src="components/BottomNav.jsx"></script>
<script type="text/babel" src="components/Header.jsx"></script>
<script type="text/babel" src="components/Button.jsx"></script>
<script type="text/babel" src="components/Field.jsx"></script>
<script type="text/babel" src="components/Chip.jsx"></script>
<script type="text/babel" src="components/Favorites.jsx"></script>
<script type="text/babel" src="components/ArtistCard.jsx"></script>
<script type="text/babel" src="components/CalendarMini.jsx"></script>
<script type="text/babel" src="components/Stepper.jsx"></script>
<script type="text/babel" src="components/Screens.jsx"></script>
<script type="text/babel" src="components/BiskoAI.jsx"></script>
<script type="text/babel" src="components/MoreScreens.jsx"></script>
<script type="text/babel" src="components/SessionFlow.jsx"></script>
<script type="text/babel" src="components/ChatV2.jsx"></script>

<script type="text/babel" data-presets="react">
(function () {
  const { useState, useEffect } = React;

  const SCREEN_LIST = [
    { key: "landing",  label: "01 Landing",  Component: window.LandingScreen  },
    { key: "login",    label: "02 Login",    Component: window.LoginScreen    },
    { key: "cadastro", label: "02b Cadastro",Component: window.CadastroScreen },
    { key: "home",     label: "03 Home",     Component: window.HomeScreen     },
    { key: "artist",   label: "04 Artist",   Component: window.ArtistScreen   },
    { key: "booking",  label: "05 Booking",  Component: window.BookingScreen  },
    { key: "payment",  label: "06 Payment",  Component: window.PaymentScreen  },
    { key: "confirmed",label: "06b Done",    Component: window.ConfirmedScreen},
    { key: "bisko",    label: "07 Simulador",Component: window.SimulatorScreen},
    { key: "chat",     label: "08 Chat",     Component: window.ChatScreen     },
    { key: "calendar", label: "09 Calendar", Component: window.CalendarScreen },
    { key: "session",  label: "09b Sessão",  Component: window.SessionDetailScreen },
    { key: "checkin",  label: "10 Check-in", Component: window.CheckinScreen  },
    { key: "scanner",  label: "10b Scanner", Component: window.ScannerScreen  },
    { key: "post",     label: "11 Healing",  Component: window.PostTattooScreen},
    { key: "rating",   label: "12 Rating",   Component: window.RatingScreen   },
    { key: "dashboard",label: "13 Dashboard",Component: window.DashboardScreen},
    { key: "settings", label: "14 Settings", Component: window.SettingsScreen },
  ];

  function Shell() {
    const [screen, setScreen] = useState("landing");
    const [ctx, setCtx] = useState({});

    function go(next, extra) {
      if (extra) setCtx((c) => ({ ...c, ...extra }));
      setScreen(next);
    }

    const Current = SCREEN_LIST.find((s) => s.key === screen)?.Component || window.LandingScreen;

    return (
      <div style={{ display: "flex", alignItems: "center", gap: 32 }}>
        <div className="sidebar">
          <h2>RABISKO</h2>
          {SCREEN_LIST.map((s) => (
            <button
              key={s.key}
              className={s.key === screen ? "active" : ""}
              onClick={() => setScreen(s.key)}
            >
              {s.label}
            </button>
          ))}
          <div className="hint">Click a label to jump, or tap inside the phone to navigate naturally.</div>
        </div>

        <div className="device">
          <div className="notch"></div>
          <div className="status-time">9:41</div>
          <div className="status-icons">
            <iconify-icon icon="material-symbols:signal-cellular-alt" width="14"></iconify-icon>
            <iconify-icon icon="material-symbols:wifi" width="14"></iconify-icon>
            <iconify-icon icon="material-symbols:battery-full" width="14"></iconify-icon>
          </div>
          <div className="screen">
            <Current go={go} screen={screen} ctx={ctx} />
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Shell />);
})();
</script>

</body>
</html>
