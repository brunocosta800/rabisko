<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Rabisko · Icon library</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>
  body { margin: 0; background: var(--rbk-bg); }
  .card { width: 700px; height: 320px; padding: 24px 32px; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 18px 14px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic iconify-icon { color: var(--rbk-ink); }
  .name { font-family: var(--font-mono); font-size: 9px; color: var(--rbk-fg-3); text-align: center; line-height: 1.2; }
</style></head>
<body>
<div class="card">
  <div class="grid">
    <div class="ic"><iconify-icon icon="boxicons:home-filled" width="28"></iconify-icon><div class="name">home</div></div>
    <div class="ic"><iconify-icon icon="majesticons:chat" width="28"></iconify-icon><div class="name">chat</div></div>
    <div class="ic"><iconify-icon icon="line-md:calendar" width="28"></iconify-icon><div class="name">calendar</div></div>
    <div class="ic"><iconify-icon icon="solar:settings-bold" width="28"></iconify-icon><div class="name">settings</div></div>
    <div class="ic"><iconify-icon icon="tabler:search" width="28"></iconify-icon><div class="name">search</div></div>
    <div class="ic"><iconify-icon icon="mdi:filter" width="28"></iconify-icon><div class="name">filter</div></div>
    <div class="ic"><iconify-icon icon="ic:round-star" width="28"></iconify-icon><div class="name">star</div></div>
    <div class="ic"><iconify-icon icon="bi:stars" width="28"></iconify-icon><div class="name">bi:stars</div></div>
    <div class="ic"><iconify-icon icon="ion:chevron-back-outline" width="28"></iconify-icon><div class="name">back</div></div>
    <div class="ic"><iconify-icon icon="ic:round-chevron-right" width="28"></iconify-icon><div class="name">chevron-r</div></div>
    <div class="ic"><iconify-icon icon="famicons:mail" width="28"></iconify-icon><div class="name">mail</div></div>
    <div class="ic"><iconify-icon icon="boxicons:lock-filled" width="28"></iconify-icon><div class="name">lock</div></div>
    <div class="ic"><iconify-icon icon="weui:eyes-off-filled" width="28"></iconify-icon><div class="name">eye-off</div></div>
    <div class="ic"><iconify-icon icon="tabler:clock-filled" width="28"></iconify-icon><div class="name">clock</div></div>
    <div class="ic"><iconify-icon icon="mdi:calendar" width="28"></iconify-icon><div class="name">cal-fill</div></div>
    <div class="ic"><iconify-icon icon="solar:card-bold" width="28"></iconify-icon><div class="name">card</div></div>
    <div class="ic"><iconify-icon icon="ic:baseline-pix" width="28"></iconify-icon><div class="name">pix</div></div>
    <div class="ic"><iconify-icon icon="fa6-brands:apple-pay" width="28"></iconify-icon><div class="name">apple-pay</div></div>
    <div class="ic"><iconify-icon icon="wordpress:send" width="28"></iconify-icon><div class="name">send</div></div>
    <div class="ic"><iconify-icon icon="mingcute:pencil-fill" width="28"></iconify-icon><div class="name">pencil</div></div>
    <div class="ic"><iconify-icon icon="mynaui:bell-solid" width="28"></iconify-icon><div class="name">bell</div></div>
    <div class="ic"><iconify-icon icon="qlementine-icons:user-16" width="28"></iconify-icon><div class="name">user</div></div>
    <div class="ic"><iconify-icon icon="material-symbols:help-rounded" width="28"></iconify-icon><div class="name">help</div></div>
    <div class="ic"><iconify-icon icon="mdi:magic" width="28"></iconify-icon><div class="name">magic</div></div>
  </div>
</div>
</body></html>
