<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Rabisko · Brand imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--rbk-bg); }
  .card { width: 700px; height: 280px; padding: 28px 32px; box-sizing: border-box; display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .pic { width: 100%; height: 100%; background: center/cover no-repeat; border-radius: 24px; }
  .stack { display:flex; flex-direction:column; gap: 8px; }
  .name { font: var(--t-body-sm); color: var(--rbk-ink); font-weight: 600; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--rbk-fg-3); }
</style></head>
<body>
<div class="card">
  <div class="stack"><div class="pic" style="background-image:url('../assets/portrait-artist.png'); height: 200px"></div><div class="name">Portrait</div><div class="meta">portrait-artist.png</div></div>
  <div class="stack"><div class="pic" style="background-image:url('../assets/tattoo-work-1.png'); height: 200px"></div><div class="name">Portfolio · sleeve</div><div class="meta">tattoo-work-1.png</div></div>
  <div class="stack"><div class="pic" style="background-image:url('../assets/tattoo-work-2.png'); height: 200px"></div><div class="name">Portfolio · linework</div><div class="meta">tattoo-work-2.png</div></div>
</div>
</body></html>
