<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Rabisko · DM Sans for names</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--rbk-bg); }
  .card { width: 700px; height: 240px; padding: 28px 32px; box-sizing: border-box; }
  .name { font: var(--t-h1); color: var(--rbk-ink); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--rbk-fg-3); margin-top: 6px; letter-spacing: .04em; text-transform: uppercase; }
  .sub  { font: var(--t-h3); color: var(--rbk-ink); margin-top: 22px; }
</style></head>
<body>
<div class="card">
  <div class="name">João Santos</div>
  <div class="meta">DM Sans · 32 / Bold · used for human names on profile screens</div>
  <div class="sub">Sobre</div>
  <div class="meta">DM Sans · 20 / Bold · used for section titles inside profile cards</div>
</div>
</body></html>
