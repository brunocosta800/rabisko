<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Rabisko · Primary colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--rbk-bg); font: var(--t-body); }
  .card { width: 700px; height: 220px; padding: 24px 32px; box-sizing: border-box; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw { display:flex; flex-direction:column; gap: 8px; }
  .chip { height: 110px; border-radius: 12px; border: 1px solid rgba(0,0,0,.06); }
  .name { font-weight: 600; font-size: 13px; color: var(--rbk-ink); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--rbk-fg-3); letter-spacing: .02em; }
</style></head>
<body>
<div class="card">
  <div class="sw"><div class="chip" style="background:var(--rbk-bg)"></div><div class="name">bg</div><div class="hex">#F8F9FA</div></div>
  <div class="sw"><div class="chip" style="background:var(--rbk-surface)"></div><div class="name">surface</div><div class="hex">#EAE0D5</div></div>
  <div class="sw"><div class="chip" style="background:var(--rbk-ink)"></div><div class="name">ink</div><div class="hex">#000000</div></div>
  <div class="sw"><div class="chip" style="background:var(--rbk-plum)"></div><div class="name">plum</div><div class="hex">#602C66</div></div>
</div>
</body></html>
