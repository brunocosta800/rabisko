<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Rabisko · Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--rbk-bg); }
  .card { width: 700px; height: 260px; padding: 28px 32px; box-sizing: border-box; }
  .xl { font: var(--t-display-xl); line-height: 1; color: var(--rbk-ink); letter-spacing: .015em; }
  .lg { font: var(--t-display-lg); letter-spacing: .015em; color: var(--rbk-ink); margin-top: 14px; }
  .md { font: var(--t-display-md); letter-spacing: .03em; color: var(--rbk-ink); margin-top: 12px; }
  .meta { font: var(--t-caption); color: var(--rbk-fg-3); margin-top: 4px; font-family: var(--font-mono); }
</style></head>
<body>
<div class="card">
  <div class="xl">RABISKO</div>
  <div class="meta">Bebas Neue · 64 / 1.0 · +0.015em</div>
  <div class="lg">BUSQUE SEU ARTISTA</div>
  <div class="meta">Bebas Neue · 32 / 1.0 — screen title</div>
  <div class="md">BISKO AI</div>
  <div class="meta">Bebas Neue · 20 / 1.0 — card eyebrow</div>
</div>
</body></html>
