<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Rabisko · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--rbk-bg); font: var(--t-body-sm); color: var(--rbk-ink); }
  .card { width: 700px; height: 220px; padding: 28px 32px; box-sizing: border-box; display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .sw { display:flex; flex-direction:column; align-items: flex-start; gap: 8px; }
  .box { width: 100%; height: 110px; background: var(--rbk-surface); border: 1px solid rgba(0,0,0,.04); }
  .label { font-weight: 600; font-size: 12px; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--rbk-fg-3); letter-spacing: .02em; }
</style></head>
<body>
<div class="card">
  <div class="sw"><div class="box" style="border-radius:8px"></div><div class="label">r-sm</div><div class="val">8px</div></div>
  <div class="sw"><div class="box" style="border-radius:16px"></div><div class="label">r-md</div><div class="val">16px · cards</div></div>
  <div class="sw"><div class="box" style="border-radius:24px"></div><div class="label">r-lg</div><div class="val">24px</div></div>
  <div class="sw"><div class="box" style="border-radius:32px"></div><div class="label">r-pill</div><div class="val">32px · CTA</div></div>
  <div class="sw"><div class="box" style="border-radius:999px"></div><div class="label">r-full</div><div class="val">avatars</div></div>
</div>
</body></html>
