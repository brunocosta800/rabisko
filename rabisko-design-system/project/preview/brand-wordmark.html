<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Rabisko · Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--rbk-bg); }
  .card { width: 700px; height: 240px; display:flex; align-items:center; gap: 32px; padding: 32px; box-sizing: border-box; }
  .mark { width: 120px; height: 120px; flex: 0 0 120px; border-radius: 12px; background: var(--rbk-ink) url("../assets/logo-bisko-mark.png") center/cover; }
  .word { font: var(--t-display-xl); letter-spacing: .015em; color: var(--rbk-ink); line-height: 1; }
  .tag  { font: var(--t-body); color: var(--rbk-fg-3); margin-top: 12px; max-width: 360px; }
</style></head>
<body>
<div class="card">
  <div class="mark" aria-label="Bisko mark"></div>
  <div>
    <div class="word">RABISKO</div>
    <div class="tag">Wordmark set in Bebas Neue 64pt with a +1.5% letter-spacing nudge. The mark sits 32pt from the wordmark; never tinted, never on a non-black square.</div>
  </div>
</div>
</body></html>
