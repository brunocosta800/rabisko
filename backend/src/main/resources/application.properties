spring.application.name=mvp
server.port=8080

# Importa as variáveis do arquivo .env na raiz do backend
spring.config.import=optional:file:.env[.properties]

api.security.token.secret=${JWT_SECRET:my-secret-key}

# ----------------------------------------------------------------------
# Migração Mongo -> Supabase (Postgres gerenciado, modo "só banco").
#
# As três linhas antigas (spring.mongodb.uri / .database /
# .auto-index-creation) foram substituídas pelo bloco abaixo. O Supabase
# é apenas um Postgres do ponto de vista da aplicação — login/cadastro
# continuam emitindo JWT pelo TokenService; nada de Supabase Auth aqui.
#
# Host: use o "Session Pooler" do Supabase (Supavisor em modo session,
# porta 5432). Motivos:
#   - Direct connection (db.<ref>.supabase.co:5432) é IPv6-only no plano
#     free, falha em redes IPv4.
#   - Transaction pooler (porta 6543) quebra prepared statements e
#     conexões longas que o Hibernate usa.
#
# Usuário tem o formato `postgres.<project-ref>` quando se conecta pelo
# pooler. A senha NÃO é a anon/service_role key — é a "Database password"
# em Project Settings -> Database.
# ----------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.jfcpnoyqwyqwtbdshhfv
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema é dono do Supabase (tabelas users/clientes/tatuadores/estudios
# etc. já existem lá, com tipos ENUM nativos e UUIDs). Usamos `validate`
# para que o Hibernate, no boot, apenas CONFIRME que cada @Entity bate
# com a tabela correspondente — e estoure rápido se o mapeamento
# divergir. NUNCA usar `update`/`create` apontando para Supabase: o
# Hibernate iria tentar mexer nos schemas auth/storage/realtime/etc.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Pool pequeno: o Supavisor já agrega conexões do lado do Supabase,
# então não precisamos abrir muitas do nosso lado.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Aumentando limites de upload de arquivos (15MB)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

